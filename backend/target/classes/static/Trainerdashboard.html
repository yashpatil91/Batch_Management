	<script>
		let isEditMode = false;
		let editingBatchId = null;
		let trainerData = [];

		const API_BASE_URL = "";
		const token = localStorage.getItem("token");
		const role = localStorage.getItem("role");

		// ----------------------------
		// AUTH CHECK
		// ----------------------------
		if (!token) window.location.href = "index.html";
		if (!role || role !== "TRAINER") {
		  window.location.href = role === "ADMIN" ? "dashboard.html" : "index.html";
		}

		// ----------------------------
		// BASIC HELPERS
		// ----------------------------
		function logout() {
		  localStorage.clear();
		  window.location.href = "index.html";
		}

		function formatDate(v) {
		  if (!v) return "N/A";
		  const d = new Date(v);
		  return Number.isNaN(d.getTime()) ? v : d.toLocaleDateString();
		}

		function setLoggedInName() {
		  const name = localStorage.getItem("name");
		  if (!name) return;
		  const targets = document.querySelectorAll(
		    "h3.text-\\[\\#9df0f4\\].font-semibold.text-xs.leading-tight"
		  );
		  targets.forEach(node => {
		    node.textContent = name;
		  });
		}

		// ----------------------------
		// TIME UTILITIES
		// ----------------------------
		function convertTo24(t) {
		  if (!t) return "";
		  t = t.trim();

		  if (t.includes("AM") || t.includes("PM")) {
		    const [timePart, modifier] = t.split(" ");
		    let [hours, minutes] = timePart.split(":");

		    if (modifier === "PM" && hours !== "12") {
		      hours = String(parseInt(hours) + 12);
		    }
		    if (modifier === "AM" && hours === "12") {
		      hours = "00";
		    }
		    return `${hours.padStart(2, "0")}:${minutes}`;
		  }

		  return t;
		}

		function timeToMinutes(time) {
		  const [hours, mins] = convertTo24(time).split(":").map(Number);
		  return hours * 60 + mins;
		}

		// ----------------------------
		// TIME CONFLICT CHECK (declared ONCE)
		// ----------------------------
		function isTimeConflict(start1, end1, start2, end2) {
		  const s1 = timeToMinutes(start1);
		  const e1 = timeToMinutes(end1);
		  const s2 = timeToMinutes(start2);
		  const e2 = timeToMinutes(end2);
		  return s1 < e2 && e1 > s2;
		}

		// ----------------------------
		// DATE OVERLAP CHECK (safe string + Date comparison)
		// ----------------------------
		function hasDateOverlap(startDate, endDate, batchStartDate, batchEndDate) {
		  // Normalize to Date objects to avoid string comparison pitfalls
		  const newStart  = new Date(startDate);
		  const newEnd    = new Date(endDate);
		  const bStart    = new Date(batchStartDate);
		  const bEnd      = new Date(batchEndDate);
		  return newStart <= bEnd && newEnd >= bStart;
		}

		// ----------------------------
		// TRAINER CONFLICT CHECK
		// Used for both CREATE and EDIT (excludes current batch during edit)
		// ----------------------------
		function hasTrainerConflict(startDate, endDate, startTime, endTime) {
		  for (const batch of trainerData) {

		    // Skip same batch during edit — use loose == to handle number/string mismatch from API
		    if (editingBatchId != null && String(batch.id) === String(editingBatchId)) continue;

		    // Ignore completed batches
		    if (String(batch.status).toUpperCase() === "COMPLETED") continue;

		    // Date overlap check
		    if (!hasDateOverlap(startDate, endDate, batch.startDate, batch.endDate)) continue;

		    // Must have a valid time range
		    if (!batch.time || !batch.time.includes("-")) continue;

		    const [existingStart, existingEnd] = batch.time.split("-").map(t => convertTo24(t.trim()));

		    if (isTimeConflict(startTime, endTime, existingStart, existingEnd)) {
		      return true;
		    }
		  }
		  return false;
		}

		// ----------------------------
		// LAB CONFLICT CHECK
		// Used for both CREATE and EDIT (excludes current batch during edit)
		// ----------------------------
		function hasLabConflict(startDate, endDate, startTime, endTime, selectedLab) {
		  // Normalize the selected lab (e.g. "Lab-1" → "Lab-01")
		  const normalizeLabNo = lab =>
		    lab
		      .replace("Lab-1", "Lab-01")
		      .replace("Lab-2", "Lab-02")
		      .replace("Lab-3", "Lab-03")
		      .replace("Lab-4", "Lab-04")
		      .replace("Lab-5", "Lab-05");

		  const normalizedSelected = normalizeLabNo(selectedLab);

		  for (const batch of trainerData) {

		    // Skip same batch during edit — string coercion guards against number/string API mismatch
		    if (editingBatchId != null && String(batch.id) === String(editingBatchId)) continue;

		    // Ignore completed batches
		    if (String(batch.status).toUpperCase() === "COMPLETED") continue;

		    // Date overlap check
		    if (!hasDateOverlap(startDate, endDate, batch.startDate, batch.endDate)) continue;

		    // Must have a valid time range
		    if (!batch.time || !batch.time.includes("-")) continue;

		    const [existingStart, existingEnd] = batch.time.split("-").map(t => convertTo24(t.trim()));

		    if (!isTimeConflict(startTime, endTime, existingStart, existingEnd)) continue;

		    // Check if lab matches
		    const batchLab = normalizeLabNo(batch.labNo || "");
		    if (batchLab === normalizedSelected) {
		      return true;
		    }
		  }
		  return false;
		}

		// ----------------------------
		// GET OCCUPIED LABS (for dropdown filtering)
		// Excludes current batch during edit
		// ----------------------------
		function getOccupiedLabs(startDate, endDate, startTime, endTime) {
		  const normalizeLabNo = lab =>
		    lab
		      .replace("Lab-1", "Lab-01")
		      .replace("Lab-2", "Lab-02")
		      .replace("Lab-3", "Lab-03")
		      .replace("Lab-4", "Lab-04")
		      .replace("Lab-5", "Lab-05");

		  return trainerData
		    .filter(batch => {
		      if (editingBatchId != null && String(batch.id) === String(editingBatchId)) return false;
		      if (String(batch.status).toUpperCase() === "COMPLETED") return false;
		      if (!hasDateOverlap(startDate, endDate, batch.startDate, batch.endDate)) return false;
		      if (!batch.time || !batch.time.includes("-")) return false;

		      const [existingStart, existingEnd] = batch.time.split("-").map(t => convertTo24(t.trim()));
		      return isTimeConflict(startTime, endTime, existingStart, existingEnd);
		    })
		    .map(batch => normalizeLabNo(batch.labNo || ""));
		}

		// ----------------------------
		// CREATE BATCH FORM SUBMIT
		// ----------------------------
		document.getElementById("createBatchForm").addEventListener("submit", async (event) => {
		  event.preventDefault();

		  const domainName    = document.getElementById("batchDomainName").value.trim();
		  const startDate     = document.getElementById("batchStartDate").value;
		  const endDate       = document.getElementById("batchEndDate").value;
		  const startTime     = document.getElementById("batchStartTime").value;
		  const endTime       = document.getElementById("batchEndTime").value;
		  const selectedLab   = document.getElementById("batchLabNo").value;
		  const noOfStudents  = document.getElementById("batchStudents").value;

		  // Required field check
		  if (!domainName || !startDate || !endDate || !startTime || !endTime || !selectedLab || !noOfStudents) {
		    alert("Please fill all fields.");
		    return;
		  }

		  // Trainer time conflict check
		  if (hasTrainerConflict(startDate, endDate, startTime, endTime)) {
		    alert("You already have another batch scheduled at this time. Please choose a different time.");
		    return;
		  }

		  // Lab occupancy check
		  if (hasLabConflict(startDate, endDate, startTime, endTime, selectedLab)) {
		    alert("Selected lab is already occupied during this time. Please choose a different lab.");
		    return;
		  }

		  const payload = {
		    domainName,
		    startDate,
		    endDate,
		    time: `${startTime} - ${endTime}`,
		    labNo: selectedLab,
		    noOfStudents,
		    progress: 0
		  };

		  try {
		    const res = await fetch(`${API_BASE_URL}/api/trainer/batches`, {
		      method: "POST",
		      headers: {
		        Authorization: `Bearer ${token}`,
		        "Content-Type": "application/json"
		      },
		      body: JSON.stringify(payload)
		    });

		    if (!res.ok) {
		      const errorText = await res.text();
		      throw new Error(errorText || "Failed to create batch");
		    }

		    alert("Batch created successfully!");
		    event.target.reset();
		    await loadTrainerDashboard();

		  } catch (e) {
		    console.error(e);
		    alert("Unable to create batch: " + e.message);
		  }
		});

		// ----------------------------
		// AVAILABLE LABS FILTER (Edit modal)
		// ----------------------------
		async function updateAvailableLabs() {
		  const startDate = document.getElementById("editStartDate").value;
		  const endDate   = document.getElementById("editEndDate").value;
		  const startTime = document.getElementById("editStartTime").value;
		  const endTime   = document.getElementById("editEndTime").value;

		  if (!startDate || !endDate || !startTime || !endTime) return;

		  const allLabs      = ["Lab-01", "Lab-02", "Lab-03", "Lab-04", "Lab-05"];
		  const occupiedLabs = getOccupiedLabs(startDate, endDate, startTime, endTime);
		  const availableLabs = allLabs.filter(lab => !occupiedLabs.includes(lab));

		  const labSelect = document.getElementById("editLabNo");
		  labSelect.innerHTML = `<option value="" disabled hidden>Select Lab</option>`;

		  availableLabs.forEach(lab => {
		    labSelect.innerHTML += `<option value="${lab}" class="text-black">${lab}</option>`;
		  });

		  if (availableLabs.length === 0) {
		    alert("No labs available for the selected time. Please choose a different time.");
		  }
		}

		// ----------------------------
		// CARD CREATION
		// ----------------------------
		function createCard(batch) {
		  const progress = batch.progress ?? 0;

		  return `
		    <div class="bg-surface-container-lowest p-6 rounded-xl group transition-all hover:translate-y-[-2px]">

		      <div class="flex justify-between items-start mb-6">
		        <div>
		          <div class="flex items-center gap-2 mb-1">
		            <span class="w-2 h-2 rounded-full bg-primary ${progress < 100 ? "animate-pulse" : ""}"></span>
		            <span class="text-[10px] font-bold text-primary uppercase tracking-widest">
		              ${batch.status || "ONGOING"}
		            </span>
		          </div>

		          <h3 class="text-xl font-headline font-bold text-on-surface">
		            ${batch.domainName || "Untitled Batch"}
		          </h3>

		          <p class="text-sm text-on-surface-variant line-clamp-1 mt-1">
		            ${batch.labNo || "Lab allocation pending"}
		          </p>
		        </div>

		        <div class="text-right">
		          <span class="block text-xs font-label text-outline uppercase tracking-wider">
		            Timeline
		          </span>
		          <span class="text-sm font-medium text-on-surface">
		            ${formatDate(batch.startDate)} - ${formatDate(batch.endDate)}
		          </span>
		        </div>
		      </div>

		      <div class="space-y-4">

		        <div class="flex items-center gap-4">
		          <div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
		            <div class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full" style="width:${progress}%"></div>
		          </div>
		          <span class="font-headline font-bold text-lg text-primary">${progress}%</span>
		        </div>

		        <div class="flex gap-2">
		          <input id="topic-input-${batch.id}" 
		            class="flex-1 bg-surface-container-low border-none rounded-lg text-xs p-2" 
		            placeholder="Add topic/syllabus item">

		          <button onclick="addTopic(${batch.id})" 
		            class="bg-primary text-on-primary px-3 py-2 rounded-lg text-xs font-bold">
		            Add Topic
		          </button>
		        </div>

		        <div id="topics-${batch.id}" 
		          class="space-y-2 text-xs text-on-surface-variant">
		          Loading topics...
		        </div>

		        <div class="flex justify-between items-center pt-4 border-t border-surface-container-high">

		          <button 
		            onclick="completeBatch(${batch.id})"
		            class="flex items-center gap-1 px-3 py-1.5 text-xs font-semibold rounded-md bg-primary text-white">
		            Complete
		          </button>

		          <div class="flex gap-2">
		            <button 
		              onclick="openEditForm(${batch.id}, '${batch.domainName}', '${batch.startDate}', '${batch.endDate}', '${batch.time}', '${batch.labNo}', ${batch.noOfStudents})"
		              class="flex items-center gap-1 px-3 py-1.5 text-xs font-semibold rounded-md border border-outline">
		              Edit
		            </button>

		            <button 
		              onclick="deleteBatch(${batch.id})"
		              class="flex items-center gap-1 px-3 py-1.5 text-xs font-semibold rounded-md bg-error text-white">
		              Delete
		            </button>
		          </div>

		        </div>
		      </div>
		    </div>
		  `;
		}

		// ----------------------------
		// TOPICS
		// ----------------------------
		async function loadTopics(batchId) {
		  const container = document.getElementById(`topics-${batchId}`);
		  if (!container) return;

		  const res = await fetch(
		    `${API_BASE_URL}/api/trainer/batches/${batchId}/topics`,
		    { headers: { Authorization: `Bearer ${token}` } }
		  );

		  if (!res.ok) {
		    container.innerHTML = "Unable to load topics.";
		    return;
		  }

		  const topics = await res.json();

		  if (!topics.length) {
		    container.innerHTML = "No topics yet. Add one to start progress.";
		    return;
		  }

		  container.innerHTML = topics.map(topic => `
		    <div class="flex items-center justify-between gap-2">

		      <label class="flex items-center gap-2 cursor-pointer">
		        <input type="checkbox" ${topic.completed ? "checked" : ""} 
		          onchange="toggleTopic(${topic.id}, this.checked)">
		        <span class="${topic.completed ? "line-through text-outline" : ""}">
		          ${topic.title}
		        </span>
		      </label>

		      <div class="flex gap-2 items-center">
		        <button 
		          onclick="editTopic(${topic.id}, '${topic.title.replace(/'/g, "\\'")}')"
		          class="p-2 rounded-lg hover:bg-secondary/20">
		          <span class="material-symbols-outlined text-secondary">edit</span>
		        </button>

		        <button 
		          onclick="deleteTopic(${topic.id})"
		          class="p-2 rounded-lg hover:bg-error/20">
		          <span class="material-symbols-outlined text-error">delete</span>
		        </button>
		      </div>
		    </div>
		  `).join("");
		}

		// ----------------------------
		// ADD NEW TOPIC
		// ----------------------------
		async function addTopic(batchId) {
		  const input = document.getElementById(`topic-input-${batchId}`);
		  const title = input.value.trim();
		  if (!title) return;

		  const res = await fetch(`${API_BASE_URL}/api/trainer/batches/${batchId}/topics`, {
		    method: "POST",
		    headers: {
		      Authorization: `Bearer ${token}`,
		      "Content-Type": "application/json"
		    },
		    body: JSON.stringify({ title })
		  });

		  if (!res.ok) {
		    alert("Unable to add topic: " + await res.text());
		    return;
		  }

		  input.value = "";
		  await loadTrainerDashboard();
		}

		// ----------------------------
		// TOGGLE TOPIC COMPLETE
		// ----------------------------
		async function toggleTopic(topicId, completed) {
		  const res = await fetch(`${API_BASE_URL}/api/trainer/topics/${topicId}`, {
		    method: "PUT",
		    headers: {
		      Authorization: `Bearer ${token}`,
		      "Content-Type": "application/json"
		    },
		    body: JSON.stringify({ completed })
		  });

		  if (!res.ok) {
		    alert("Unable to update topic: " + await res.text());
		    return;
		  }

		  await loadTrainerDashboard();
		}

		// ----------------------------
		// DELETE TOPIC
		// ----------------------------
		async function deleteTopic(topicId) {
		  if (!confirm("Are you sure you want to delete this topic?")) return;

		  const res = await fetch(`${API_BASE_URL}/api/trainer/topics/${topicId}`, {
		    method: "DELETE",
		    headers: { Authorization: `Bearer ${token}` }
		  });

		  if (!res.ok) {
		    alert("Unable to delete topic: " + await res.text());
		    return;
		  }

		  await loadTrainerDashboard();
		}

		// ----------------------------
		// EDIT TOPIC (prompt)
		// ----------------------------
		function editTopic(topicId, currentTitle) {
		  const newTitle = prompt("Edit topic name:", currentTitle);
		  if (!newTitle || newTitle.trim() === "" || newTitle === currentTitle) return;
		  updateTopic(topicId, newTitle.trim());
		}

		// ----------------------------
		// UPDATE TOPIC TITLE
		// ----------------------------
		async function updateTopic(topicId, title) {
		  const res = await fetch(`${API_BASE_URL}/api/trainer/topics/${topicId}/title`, {
		    method: "PUT",
		    headers: {
		      Authorization: `Bearer ${token}`,
		      "Content-Type": "application/json"
		    },
		    body: JSON.stringify({ title })
		  });

		  if (!res.ok) {
		    alert("Unable to update topic: " + await res.text());
		    return;
		  }

		  await loadTrainerDashboard();
		}

		// ----------------------------
		// DASHBOARD LOAD
		// ----------------------------
		async function loadTrainerDashboard() {
		  try {
		    const res = await fetch(`${API_BASE_URL}/api/trainer/batches`, {
		      headers: { Authorization: `Bearer ${token}` }
		    });

		    if (!res.ok) throw new Error("Failed to load trainer batches");

		    trainerData = await res.json();

		    const total     = trainerData.length;
		    const completed = trainerData.filter(b => String(b.status).toUpperCase() === "COMPLETED").length;
		    const avg       = total
		      ? Math.round(trainerData.reduce((a, b) => a + (b.progress ?? 0), 0) / total)
		      : 0;

		    document.getElementById("kpiTotal").innerText     = total;
		    document.getElementById("kpiCompleted").innerText = completed;
		    document.getElementById("kpiProgress").innerText  = `${avg}%`;

		    const activeBatches = trainerData.filter(b => String(b.status).toUpperCase() !== "COMPLETED");

		    document.getElementById("trainerBatchCards").innerHTML = activeBatches.map(createCard).join("");

		    await Promise.all(activeBatches.map(batch => loadTopics(batch.id)));

		  } catch (e) {
		    console.error(e);
		  }
		}

		// ----------------------------
		// OPEN EDIT MODAL
		// FIX: Set time fields BEFORE calling updateAvailableLabs
		// ----------------------------
		async function openEditForm(id, name, start, end, time, lab, students) {
		  editingBatchId = id;

		  document.getElementById("editDomainName").value = name     || "";
		  document.getElementById("editStartDate").value  = start    || "";
		  document.getElementById("editEndDate").value    = end      || "";
		  document.getElementById("editStudents").value   = students || "";

		  // Set time fields FIRST so updateAvailableLabs reads the correct values
		  if (time && time.includes("-")) {
		    const parts = time.split("-");
		    document.getElementById("editStartTime").value = convertTo24(parts[0].trim());
		    document.getElementById("editEndTime").value   = convertTo24(parts[1].trim());
		  }

		  // Now populate available labs (correct times are already set)
		  await updateAvailableLabs();

		  // After labs are populated, set the current lab as selected
		  if (lab) {
		    const fixedLab = lab
		      .replace("Lab-1", "Lab-01")
		      .replace("Lab-2", "Lab-02")
		      .replace("Lab-3", "Lab-03")
		      .replace("Lab-4", "Lab-04")
		      .replace("Lab-5", "Lab-05");

		    document.getElementById("editLabNo").value = fixedLab;
		  }

		  document.getElementById("editModal").classList.remove("hidden");
		  document.getElementById("editModal").classList.add("flex");
		}

		// ----------------------------
		// CLOSE EDIT MODAL
		// ----------------------------
		function closeEditModal() {
		  editingBatchId = null;
		  document.getElementById("editModal").classList.add("hidden");
		  document.getElementById("editModal").classList.remove("flex");
		}

		// ----------------------------
		// EDIT BATCH FORM SUBMIT
		// FIX: Added lab conflict check (was missing entirely)
		// ----------------------------
		document.getElementById("editBatchForm").addEventListener("submit", async e => {
		  e.preventDefault();

		  const startDate   = document.getElementById("editStartDate").value;
		  const endDate     = document.getElementById("editEndDate").value;
		  const startTime   = document.getElementById("editStartTime").value;
		  const endTime     = document.getElementById("editEndTime").value;
		  const selectedLab = document.getElementById("editLabNo").value;

		  // Trainer time conflict check (skips current batch automatically)
		  if (hasTrainerConflict(startDate, endDate, startTime, endTime)) {
		    alert("You already have another batch scheduled at this time. Please choose a different time.");
		    return;
		  }

		  // Lab occupancy check (skips current batch automatically) — was MISSING before
		  if (hasLabConflict(startDate, endDate, startTime, endTime, selectedLab)) {
		    alert("Selected lab is already occupied during this time. Please choose a different lab.");
		    return;
		  }

		  const payload = {
		    domainName:   document.getElementById("editDomainName").value,
		    startDate,
		    endDate,
		    noOfStudents: document.getElementById("editStudents").value,
		    labNo:        selectedLab,
		    time:         `${startTime} - ${endTime}`
		  };

		  try {
		    const res = await fetch(
		      `${API_BASE_URL}/api/trainer/batches/${editingBatchId}`,
		      {
		        method: "PUT",
		        headers: {
		          Authorization: `Bearer ${token}`,
		          "Content-Type": "application/json"
		        },
		        body: JSON.stringify(payload)
		      }
		    );

		    if (!res.ok) {
		      alert("Update failed: " + await res.text());
		      return;
		    }

		    alert("Batch updated successfully!");
		    closeEditModal();
		    await loadTrainerDashboard();

		  } catch (err) {
		    console.error(err);
		    alert("Error updating batch");
		  }
		});

		// ----------------------------
		// DELETE BATCH
		// ----------------------------
		async function deleteBatch(batchId) {
		  if (!confirm("Are you sure you want to delete this batch?")) return;

		  try {
		    const res = await fetch(`${API_BASE_URL}/api/trainer/batches/${batchId}`, {
		      method: "DELETE",
		      headers: { Authorization: `Bearer ${token}` }
		    });

		    if (!res.ok) {
		      alert("Delete failed: " + await res.text());
		      return;
		    }

		    alert("Batch deleted successfully!");
		    await loadTrainerDashboard();

		  } catch (err) {
		    console.error(err);
		    alert("Error deleting batch");
		  }
		}

		
		// ----------------------------
		// LIVE LAB UPDATE ON EDIT FIELD CHANGE
		// ----------------------------
		["editStartDate", "editEndDate", "editStartTime", "editEndTime"].forEach(id => {
		  document.getElementById(id).addEventListener("change", updateAvailableLabs);
		});

		// ----------------------------
		// INITIAL LOAD
		// ----------------------------
		setLoggedInName();
		loadTrainerDashboard();
	</script>
