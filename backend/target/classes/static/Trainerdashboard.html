	<script>
		let isEditMode = false;
		let editingBatchId = null;
		let trainerData = [];
		let allTrainers = [];
		const currentUserId = Number(localStorage.getItem("userId"));

		const API_BASE_URL = "";
		const token = localStorage.getItem("token");
		const role = localStorage.getItem("role");

		// ----------------------------
		// AUTH CHECK
		// ----------------------------
		if (!token) window.location.href = "index.html";
		if (!role || role !== "TRAINER") {
			window.location.href = role === "ADMIN" ? "dashboard.html" : "index.html";
		}

		// ----------------------------
		// BASIC HELPERS
		// ----------------------------
		function logout() {
			localStorage.clear();
			window.location.href = "index.html";
		}

		function formatDate(v) {
			if (!v) return "N/A";
			const d = new Date(v);
			return Number.isNaN(d.getTime()) ? v : d.toLocaleDateString();
		}

		function setLoggedInName() {
			const name = localStorage.getItem("name");
			if (!name) return;
			const targets = document.querySelectorAll(
				"h3.text-\\[\\#9df0f4\\].font-semibold.text-xs.leading-tight"
			);
			targets.forEach(node => {
				node.textContent = name;
			});
		}

		// ----------------------------
		// TIME UTILITIES
		// ----------------------------

		// "09:00 AM" → "09:00" (for <input type="time">)
		function convertTo24(t) {
			if (!t) return "";
			t = t.trim();
			if (!t.includes("AM") && !t.includes("PM")) return t;

			const parts = t.split(" ");
			const modifier = parts[parts.length - 1];
			const timePart = parts[0];
			let [hours, minutes] = timePart.split(":");

			if (modifier === "PM" && hours !== "12") hours = String(parseInt(hours) + 12);
			if (modifier === "AM" && hours === "12") hours = "00";

			return `${hours.padStart(2, "0")}:${minutes}`;
		}

		// "09:00" (24hr) → "09:00 AM" (12hr with AM/PM)
		function formatTime(t) {
			if (!t) return "";
			const [h, m] = t.split(":").map(Number);
			const period = h >= 12 ? "PM" : "AM";
			const hour = ((h + 11) % 12 + 1).toString().padStart(2, "0");
			return `${hour}:${m.toString().padStart(2, "0")} ${period}`;
		}

		function updateCreateTimePreview() {
			const startTime = document.getElementById("batchStartTime").value;
			const endTime = document.getElementById("batchEndTime").value;
			document.getElementById("batchStartTimePreview").textContent = startTime ? formatTime(startTime) : "Select time";
			document.getElementById("batchEndTimePreview").textContent = endTime ? formatTime(endTime) : "Select time";
		}

		function timeToMinutes(time) {
			const converted = convertTo24(time);
			if (!converted) return 0;
			const [hours, mins] = converted.split(":").map(Number);
			return hours * 60 + mins;
		}

		// "09:00 AM - 11:00 AM" → ["09:00 AM", "11:00 AM"]
		// Splits on " - " with spaces to avoid breaking AM/PM tokens
		function splitBatchTime(timeStr) {
			if (!timeStr) return [null, null];
			const idx = timeStr.indexOf(" - ");
			if (idx === -1) return [null, null];
			return [timeStr.substring(0, idx).trim(), timeStr.substring(idx + 3).trim()];
		}

		// ----------------------------
		// ALLOWED HOURS CHECK (7AM - 7PM)
		// startTime and endTime are in 24hr format "HH:MM"
		// ----------------------------
		function isWithinAllowedHours(startTime, endTime) {
			const [startH, startM] = startTime.split(":").map(Number);
			const [endH, endM] = endTime.split(":").map(Number);

			const startMinutes = startH * 60 + startM;
			const endMinutes = endH * 60 + endM;

			const allowedStart = 7 * 60; // 07:00 = 420
			const allowedEnd = 19 * 60; // 19:00 = 1140

			return startMinutes >= allowedStart && endMinutes <= allowedEnd;
		}

		// ----------------------------
		// TIME CONFLICT CHECK
		// ----------------------------
		function isTimeConflict(start1, end1, start2, end2) {
			const s1 = timeToMinutes(start1);
			const e1 = timeToMinutes(end1);
			const s2 = timeToMinutes(start2);
			const e2 = timeToMinutes(end2);
			return s1 < e2 && e1 > s2;
		}

		// ----------------------------
		// DATE OVERLAP CHECK
		// ----------------------------
		function hasDateOverlap(startDate, endDate, batchStartDate, batchEndDate) {
			const newStart = new Date(startDate);
			const newEnd = new Date(endDate);
			const bStart = new Date(batchStartDate);
			const bEnd = new Date(batchEndDate);
			return newStart <= bEnd && newEnd >= bStart;
		}

		// ----------------------------
		// TRAINER CONFLICT CHECK
		// ----------------------------
		function hasTrainerConflict(startDate, endDate, startTime, endTime) {
			for (const batch of trainerData) {
				if (editingBatchId != null && String(batch.id) === String(editingBatchId)) continue;
				if (String(batch.status).toUpperCase() === "COMPLETED") continue;
				if (!hasDateOverlap(startDate, endDate, batch.startDate, batch.endDate)) continue;

				const [existingStartRaw, existingEndRaw] = splitBatchTime(batch.time);
				if (!existingStartRaw || !existingEndRaw) continue;

				const existingStart = convertTo24(existingStartRaw);
				const existingEnd = convertTo24(existingEndRaw);

				if (isTimeConflict(startTime, endTime, existingStart, existingEnd)) {
					return true;
				}
			}
			return false;
		}

		// ----------------------------
		// LAB CONFLICT CHECK
		// ----------------------------
		function normalizeLabNo(lab) {
			if (!lab) return "";
			return lab
				.replace(/Lab-?1$/i, "Lab-01")
				.replace(/Lab-?2$/i, "Lab-02")
				.replace(/Lab-?3$/i, "Lab-03")
				.replace(/Lab-?4$/i, "Lab-04")
				.replace(/Lab-?5$/i, "Lab-05");
		}

		function hasLabConflict(startDate, endDate, startTime, endTime, selectedLab) {
			const normalizedSelected = normalizeLabNo(selectedLab);

			for (const batch of trainerData) {
				if (editingBatchId != null && String(batch.id) === String(editingBatchId)) continue;
				if (String(batch.status).toUpperCase() === "COMPLETED") continue;
				if (!hasDateOverlap(startDate, endDate, batch.startDate, batch.endDate)) continue;

				const [existingStartRaw, existingEndRaw] = splitBatchTime(batch.time);
				if (!existingStartRaw || !existingEndRaw) continue;

				const existingStart = convertTo24(existingStartRaw);
				const existingEnd = convertTo24(existingEndRaw);

				if (!isTimeConflict(startTime, endTime, existingStart, existingEnd)) continue;

				if (normalizeLabNo(batch.labNo) === normalizedSelected) {
					return true;
				}
			}
			return false;
		}

		// ----------------------------
		// GET OCCUPIED LABS
		// ----------------------------
		function getOccupiedLabs(startDate, endDate, startTime, endTime) {
			return trainerData
				.filter(batch => {
					if (editingBatchId != null && String(batch.id) === String(editingBatchId)) return false;
					if (String(batch.status).toUpperCase() === "COMPLETED") return false;
					if (!hasDateOverlap(startDate, endDate, batch.startDate, batch.endDate)) return false;

					const [existingStartRaw, existingEndRaw] = splitBatchTime(batch.time);
					if (!existingStartRaw || !existingEndRaw) return false;

					const existingStart = convertTo24(existingStartRaw);
					const existingEnd = convertTo24(existingEndRaw);

					return isTimeConflict(startTime, endTime, existingStart, existingEnd);
				})
				.map(batch => normalizeLabNo(batch.labNo));
		}

		// ----------------------------
		// CREATE BATCH FORM SUBMIT
		// ----------------------------
		document.getElementById("createBatchForm").addEventListener("submit", async (event) => {
			event.preventDefault();

			const domainName = document.getElementById("batchDomainName").value.trim();
			const startDate = document.getElementById("batchStartDate").value;
			const endDate = document.getElementById("batchEndDate").value;
			const startTime = document.getElementById("batchStartTime").value;  // "09:00" (24hr from input)
			const endTime = document.getElementById("batchEndTime").value;    // "11:00"
			const selectedLab = document.getElementById("batchLabNo").value;
			const meetLink = document.getElementById("batchMeetLink").value.trim();
			const noOfStudents = parseInt(document.getElementById("batchStudents").value);
			const initialModuleName = document.getElementById("batchInitialModule").value.trim();

			// ── 1. Required fields ──
			if (!domainName || !startDate || !endDate || !startTime || !endTime || !selectedLab || !noOfStudents || !meetLink || !initialModuleName) {
				alert("Please fill all fields.");
				return;
			}

			// ── 2. Date validation ──
			if (new Date(startDate) > new Date(endDate)) {
				alert("End date must be after start date.");
				return;
			}

			// ── 3. Time order validation ──
			if (timeToMinutes(startTime) >= timeToMinutes(endTime)) {
				alert("End time must be after start time.");
				return;
			}

			// ── 4. Allowed hours (7AM–7PM) ──
			if (!isWithinAllowedHours(startTime, endTime)) {
				alert("Batches can only be scheduled between 7:00 AM and 7:00 PM.");
				return;
			}

			// ── 5. Trainer conflict ──
			if (hasTrainerConflict(startDate, endDate, startTime, endTime)) {
				alert("You already have another batch scheduled at this time. Please choose a different time.");
				return;
			}

			// ── 6. Lab conflict ──
			if (hasLabConflict(startDate, endDate, startTime, endTime, selectedLab)) {
				alert("Selected lab is already occupied during this time. Please choose a different lab.");
				return;
			}

			// ── 7. Build payload ──
			const payload = {
				domainName: domainName,
				startDate: startDate,
				endDate: endDate,
				time: `${formatTime(startTime)} - ${formatTime(endTime)}`, // "09:00 AM - 11:00 AM"
				labNo: selectedLab,
				noOfStudents: noOfStudents,
				progress: 0,
				meetLink: meetLink,
				moduleName: initialModuleName
			};

			console.log("Sending payload:", payload);

			try {
				const res = await fetch(`${API_BASE_URL}/api/trainer/batches`, {
					method: "POST",
					headers: {
						Authorization: `Bearer ${token}`,
						"Content-Type": "application/json"
					},
					body: JSON.stringify(payload)
				});

				if (!res.ok) {
					let errorMessage = "Failed to create batch";
					try {
						const errorJson = await res.json();
						errorMessage = errorJson.message || errorMessage;
					} catch {
						errorMessage = await res.text();
					}
					throw new Error(errorMessage);
				}

				alert("Batch created successfully!");
				event.target.reset();
				updateCreateTimePreview();
				await loadTrainerDashboard();

			} catch (e) {
				console.error("Create batch error:", e);
				alert("Unable to create batch: " + e.message);
			}
		});

		["batchStartTime", "batchEndTime"].forEach(id => {
			document.getElementById(id).addEventListener("change", updateCreateTimePreview);
			document.getElementById(id).addEventListener("input", updateCreateTimePreview);
		});

		async function updateAvailableLabs() {
			const startDate = document.getElementById("editStartDate").value;
			const endDate = document.getElementById("editEndDate").value;
			const startTime = document.getElementById("editStartTime").value;
			const endTime = document.getElementById("editEndTime").value;

			if (!startDate || !endDate || !startTime || !endTime) return;

			const allLabs = ["Lab-01", "Lab-02", "Lab-03", "Lab-04", "Lab-05"];
			const occupiedLabs = getOccupiedLabs(startDate, endDate, startTime, endTime);
			const availableLabs = allLabs.filter(lab => !occupiedLabs.includes(lab));

			const labSelect = document.getElementById("editLabNo");
			labSelect.innerHTML = `<option value="" disabled hidden>Select Lab</option>`;

			availableLabs.forEach(lab => {

			});

			if (availableLabs.length === 0) {
				alert("No labs available for the selected time. Please choose a different time.");
			}
		}

			if (!newTitle || newTitle.trim() === "" || newTitle === currentTitle) return;
			updateModuleTopic(topicId, newTitle.trim());
		}

		async function updateModuleTopic(topicId, title) {
			const res = await fetch(`${API_BASE_URL}/api/modules/topics/${topicId}/title`, {
				method: "PUT",
				headers: {Authorization: `Bearer ${token}`, "Content-Type": "application/json"},
				body: JSON.stringify({title})
			});

			if (!res.ok) {alert("Unable to update topic: " + await res.text()); return;}
			await loadTrainerDashboard();
		}
		// ----------------------------
		// LOAD ALL TRAINERS
		// ----------------------------
		async function loadAllTrainers() {

		    try {

		        const res = await fetch(
		            `${API_BASE_URL}/api/modules/trainers`,
		            {
		                headers: {
		                    Authorization: `Bearer ${token}`
		                }
		            }
		        );

		        if (!res.ok) return;

		        allTrainers = await res.json();
				if (Number.isFinite(currentUserId)) {
					allTrainers = allTrainers.filter(trainer => Number(trainer.id) !== currentUserId);
				}

		    } catch (e) {

		        console.error(e);
		    }
		}
		// ----------------------------
		// DASHBOARD LOAD
		// ----------------------------
		async function loadTrainerDashboard() {
			try {
				const res = await fetch(`${API_BASE_URL}/api/modules/my`, {
					headers: {Authorization: `Bearer ${token}`}
				});

				if (!res.ok) throw new Error("Failed to load assigned modules");

				const assignedModules = await res.json();
				trainerData = assignedModules.map(module => ({
					id: module.batchId,
					domainName: module.batchName,
					startDate: module.batchStartDate,
					endDate: module.batchEndDate,
					time: module.batchTime,
					labNo: module.batchLabNo,
					noOfStudents: module.batchNoOfStudents,
					meetLink: module.batchMeetLink,
					progress: module.progress,
					status: module.status
				}));

				const activeModules = assignedModules.filter(module => String(module.status).toUpperCase() !== "COMPLETED");
				const completed = assignedModules.filter(module => String(module.status).toUpperCase() === "COMPLETED").length;
				const total = activeModules.length;
				const avg = total
					? Math.round(activeModules.reduce((a, module) => a + (module.progress ?? 0), 0) / total)
					: 0;

				document.getElementById("kpiTotal").innerText = total;
				document.getElementById("kpiCompleted").innerText = completed;
				document.getElementById("kpiProgress").innerText = `${avg}%`;

				const groupedByBatch = activeModules.reduce((groups, module) => {
					const batchId = module.batchId || "unassigned";
					if (!groups[batchId]) {
						groups[batchId] = {
							id: batchId,
							name: module.batchName || "Unassigned Batch",
							startDate: module.batchStartDate,
							endDate: module.batchEndDate,
							time: module.batchTime,
							labNo: module.batchLabNo,
							noOfStudents: module.batchNoOfStudents,
							meetLink: module.batchMeetLink,
							modules: []
						};
					}
					groups[batchId].modules.push(module);
					return groups;
				}, {});

				const cards = Object.values(groupedByBatch).map(batch => {
					const batchProgress = batch.modules.length > 0 ? (batch.modules[0].batchProgress || 0) : 0;
					const meetLinkDisplay = batch.meetLink && batch.meetLink.trim() !== ""
						? `<a href="${batch.meetLink}" target="_blank" class="underline">${batch.meetLink}</a>`
						: "Not available";

					return `
						<div class="bg-surface-container-lowest p-6 rounded-xl group transition-all hover:translate-y-[-2px]">
							<div class="flex justify-between items-start mb-6 gap-6">
								<div>
									<div class="text-[10px] font-bold text-primary uppercase tracking-widest mb-1">Main Batch</div>
									<h3 class="text-xl font-headline font-bold text-on-surface">${batch.name}</h3>
									<p class="text-sm text-on-surface-variant mt-1">Schedule: ${batch.time || "Not set"}</p>
									<p class="text-sm text-on-surface-variant mt-1">Lab: ${batch.labNo || "N/A"} | Students: ${batch.noOfStudents || 0}</p>
									<p class="text-sm text-blue-600 mt-1">Meeting Link: ${meetLinkDisplay}</p>
								</div>
								<div class="text-right">
									<span class="block text-xs font-label text-outline uppercase tracking-wider">Timeline</span>
									<span class="text-sm font-medium text-on-surface">${formatDate(batch.startDate)} - ${formatDate(batch.endDate)}</span>
									<div class="mt-3 font-headline font-bold text-lg text-primary">${batchProgress}%</div>
									<button onclick="openEditForm(${batch.id})"
										class="mt-3 border border-outline px-3 py-1.5 rounded-md text-xs font-bold">
										Edit Batch
									</button>
								</div>
							</div>

							<div class="flex items-center gap-4 mb-5">
								<div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
									<div class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full" style="width:${batchProgress}%"></div>
								</div>
							</div>

							<div class="space-y-3">
								${batch.modules.map(module => {
									const progress = module.progress ?? 0;
									return `
										<div class="border border-outline-variant rounded-lg p-4 bg-white">
											<div class="flex justify-between gap-4">
												<div>
													<div class="text-[10px] font-bold text-outline uppercase tracking-widest">Assigned Module</div>
													<h4 class="font-headline font-bold text-lg text-on-surface">${module.name || "Unnamed Module"}</h4>
													<p class="text-xs text-on-surface-variant mt-1">Trainer: ${module.trainerName || "Unassigned"}</p>
													<p class="text-xs text-on-surface-variant mt-1">Status: ${module.status || "NOT_STARTED"}</p>
												</div>
												<div class="text-primary font-bold">${progress}%</div>
											</div>
											<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden mt-3">
												<div class="bg-primary h-full" style="width:${progress}%"></div>
											</div>
											<div class="mt-3 flex gap-2 items-center">
												<input type="file" id="excel-${module.id}" accept=".xlsx,.xls,.csv" class="text-xs w-full">
												<button onclick="uploadExcel(${module.id})" class="bg-primary text-white px-3 py-1 rounded text-xs font-bold">Upload</button>
											</div>
											<div class="mt-3 flex gap-2">
												<input id="topic-input-module-${module.id}" class="flex-1 bg-surface-container-low border-none rounded-lg text-xs p-2" placeholder="Add topic for this module">
												<button onclick="addTopicToModule(${module.id})" class="bg-primary text-on-primary px-3 py-2 rounded-lg text-xs font-bold">Add Topic</button>
											</div>
											<div id="module-topics-${module.id}" class="space-y-2 text-xs text-on-surface-variant mt-3">Loading topics...</div>
											<div class="mt-3">
												<select onchange="assignTrainer(${module.id}, this.value)" class="text-xs border border-outline-variant rounded p-1 w-full">
													<option value="">Reassign next trainer</option>
													${allTrainers.map(trainer => `<option value="${trainer.id}" ${Number(module.trainerId) === Number(trainer.id) ? "selected" : ""}>${trainer.name}</option>`).join("")}
												</select>
											</div>
											<div class="mt-3 flex justify-end">
												<button onclick="editModuleDetails(${module.id}, '${String(module.name || "").replace(/'/g, "\\'")}', '${String(module.status || "NOT_STARTED").replace(/'/g, "\\'")}')"
													class="border border-outline px-3 py-1.5 rounded-md text-xs font-bold">
													Edit Module
												</button>
											</div>
										</div>
									`;
								}).join("")}
								<div class="border border-dashed border-outline-variant rounded-lg p-4 bg-surface-container-low">
									<div class="text-[10px] font-bold text-outline uppercase tracking-widest mb-2">Next Module</div>
									<div class="flex gap-2">
										<input id="module-input-${batch.id}" class="flex-1 bg-white border border-outline-variant rounded-lg text-sm p-2" placeholder="Add next module name">
										<button onclick="addModule(${batch.id})" class="bg-primary text-white px-4 py-2 rounded-lg text-xs font-bold">Add Module</button>
									</div>
								</div>
							</div>
						</div>
					`;
				}).join("");

				document.getElementById("trainerBatchCards").innerHTML = cards || `<div class="text-sm text-on-surface-variant">No modules assigned.</div>`;
				await Promise.all(activeModules.map(module => loadModuleTopics(module.id)));

			} catch (e) {
				console.error(e);
				document.getElementById("trainerBatchCards").innerHTML =
					`<div class="text-sm text-error">Failed to load assigned modules.</div>`;
			}
		}

		// ----------------------------
		// OPEN EDIT MODAL
		// Reads from trainerData cache — no onclick param issues
		// ----------------------------
		async function openEditForm(id) {
			const batch = trainerData.find(b => String(b.id) === String(id));
			if (!batch) {alert("Batch not found. Please refresh."); return;}

			editingBatchId = id;

			document.getElementById("editDomainName").value = batch.domainName || "";
			document.getElementById("editStartDate").value = batch.startDate || "";
			document.getElementById("editEndDate").value = batch.endDate || "";
			document.getElementById("editStudents").value = batch.noOfStudents || "";
			document.getElementById("editMeetLink").value = batch.meetLink || "";

			// Split "09:00 AM - 11:00 AM" safely and convert to 24hr for input fields
			const [startRaw, endRaw] = splitBatchTime(batch.time);
			document.getElementById("editStartTime").value = startRaw ? convertTo24(startRaw) : "";
			document.getElementById("editEndTime").value = endRaw ? convertTo24(endRaw) : "";

			// Populate labs AFTER setting time values
			await updateAvailableLabs();

			// Set current lab after options are populated
			if (batch.labNo) {
				document.getElementById("editLabNo").value = normalizeLabNo(batch.labNo);
			}

			document.getElementById("editModal").classList.remove("hidden");
			document.getElementById("editModal").classList.add("flex");
		}

		// ----------------------------
		// CLOSE EDIT MODAL
		// ----------------------------
		function closeEditModal() {
			editingBatchId = null;
			document.getElementById("editModal").classList.add("hidden");
			document.getElementById("editModal").classList.remove("flex");
		}

		// ----------------------------
		// EDIT BATCH FORM SUBMIT
		// ----------------------------
		document.getElementById("editBatchForm").addEventListener("submit", async e => {
			e.preventDefault();

			const startDate = document.getElementById("editStartDate").value;
			const endDate = document.getElementById("editEndDate").value;
			const startTime = document.getElementById("editStartTime").value; // "09:00" 24hr
			const endTime = document.getElementById("editEndTime").value;   // "11:00" 24hr
			const selectedLab = document.getElementById("editLabNo").value;
			const meetLink = document.getElementById("editMeetLink").value.trim();

			// ── 1. Required fields ──
			if (!startDate || !endDate || !startTime || !endTime || !selectedLab) {
				alert("Please fill all required fields.");
				return;
			}

			// ── 2. Time order ──
			if (timeToMinutes(startTime) >= timeToMinutes(endTime)) {
				alert("End time must be after start time.");
				return;
			}

			// ── 3. Allowed hours (7AM–7PM) ──
			if (!isWithinAllowedHours(startTime, endTime)) {
				alert("Batches can only be scheduled between 7:00 AM and 7:00 PM.");
				return;
			}

			// ── 4. Trainer conflict ──
			if (hasTrainerConflict(startDate, endDate, startTime, endTime)) {
				alert("You already have another batch scheduled at this time. Please choose a different time.");
				return;
			}

			// ── 5. Lab conflict ──
			if (hasLabConflict(startDate, endDate, startTime, endTime, selectedLab)) {
				alert("Selected lab is already occupied during this time. Please choose a different lab.");
				return;
			}

			const payload = {
				domainName: document.getElementById("editDomainName").value.trim(),
				startDate: startDate,
				endDate: endDate,
				noOfStudents: parseInt(document.getElementById("editStudents").value),
				labNo: selectedLab,
				time: `${formatTime(startTime)} - ${formatTime(endTime)}`, // "09:00 AM - 11:00 AM"
				meetLink: meetLink
			};

			console.log("Edit payload:", payload);

			try {
				const res = await fetch(`${API_BASE_URL}/api/trainer/batches/${editingBatchId}`, {
					method: "PUT",
					headers: {Authorization: `Bearer ${token}`, "Content-Type": "application/json"},
					body: JSON.stringify(payload)
				});

				if (!res.ok) {alert("Update failed: " + await res.text()); return;}

				alert("Batch updated successfully!");
				closeEditModal();
				await loadTrainerDashboard();

			} catch (err) {
				console.error(err);
				alert("Error updating batch");
			}
		});

		// ----------------------------
		// DELETE BATCH
		// ----------------------------
		async function deleteBatch(batchId) {
			if (!confirm("Are you sure you want to delete this batch?")) return;

			try {
				const res = await fetch(`${API_BASE_URL}/api/trainer/batches/${batchId}`, {
					method: "DELETE",
					headers: {Authorization: `Bearer ${token}`}
				});

				if (!res.ok) {alert("Delete failed: " + await res.text()); return;}

				alert("Batch deleted successfully!");
				await loadTrainerDashboard();

			} catch (err) {
				console.error(err);
				alert("Error deleting batch");
			}
		}

		// ----------------------------
		// COMPLETE BATCH
		// ----------------------------
		async function completeBatch(batchId) {
			if (!confirm("Mark this batch as completed?")) return;

			try {
				const res = await fetch(`${API_BASE_URL}/api/trainer/complete/${batchId}`, {
					method: "PUT",
					headers: {Authorization: `Bearer ${token}`}
				});

				if (!res.ok) {alert("Failed to complete batch: " + await res.text()); return;}

				await loadTrainerDashboard();

			} catch (err) {
				console.error(err);
				alert("Error completing batch");
			}
		}

		// ----------------------------
		// LIVE LAB UPDATE ON EDIT FIELD CHANGE
		// ----------------------------
		["editStartDate", "editEndDate", "editStartTime", "editEndTime"].forEach(id => {
			document.getElementById(id).addEventListener("change", updateAvailableLabs);
		});

		// ----------------------------
		// INITIAL LOAD
		// ----------------------------
		async function initializeDashboard() {

		    setLoggedInName();

		    await loadAllTrainers();

		    await loadTrainerDashboard();
		}

		initializeDashboard();

		
	</script>
