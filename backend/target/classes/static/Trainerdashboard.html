<script>
const API_BASE_URL = "";
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");
if (!token) window.location.href = "index.html";
if (!role || role !== "TRAINER") window.location.href = role === "ADMIN" ? "dashboard.html" : "index.html";

function logout() { localStorage.clear(); window.location.href = "index.html"; }
function formatDate(v){ if(!v) return "N/A"; const d = new Date(v); return Number.isNaN(d.getTime()) ? v : d.toLocaleDateString(); }
function setLoggedInName() {
  const name = localStorage.getItem("name");
  if (!name) return;
  const targets = document.querySelectorAll("h3.text-\\[\\#9df0f4\\].font-semibold.text-xs.leading-tight");
  targets.forEach((node) => { node.textContent = name; });
}

function createCard(batch) {
  const progress = batch.progress ?? 0;
  return `<div class="bg-surface-container-lowest p-6 rounded-xl group transition-all hover:translate-y-[-2px]">
    <div class="flex justify-between items-start mb-6"><div><div class="flex items-center gap-2 mb-1">
      <span class="w-2 h-2 rounded-full bg-primary ${progress < 100 ? "animate-pulse" : ""}"></span>
      <span class="text-[10px] font-bold text-primary uppercase tracking-widest">${batch.status || "ONGOING"}</span></div>
      <h3 class="text-xl font-headline font-bold text-on-surface">${batch.domainName || "Untitled Batch"}</h3>
      <p class="text-sm text-on-surface-variant line-clamp-1 mt-1">${batch.labNo || "Lab allocation pending"}</p></div>
      <div class="text-right"><span class="block text-xs font-label text-outline uppercase tracking-wider">Timeline</span>
      <span class="text-sm font-medium text-on-surface">${formatDate(batch.startDate)} - ${formatDate(batch.endDate)}</span></div></div>
    <div class="space-y-4"><div class="flex items-center gap-4"><div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
      <div class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full" style="width:${progress}%"></div></div>
      <span class="font-headline font-bold text-lg text-primary">${progress}%</span></div>
      <div class="flex gap-2">
        <input id="topic-input-${batch.id}" class="flex-1 bg-surface-container-low border-none rounded-lg text-xs p-2" placeholder="Add topic/syllabus item">
        <button onclick="addTopic(${batch.id})" class="bg-primary text-on-primary px-3 py-2 rounded-lg text-xs font-bold">Add Topic</button>
      </div>
      <div id="topics-${batch.id}" class="space-y-2 text-xs text-on-surface-variant">Loading topics...</div>
    </div></div>`;
}

async function loadTopics(batchId) {
  const container = document.getElementById(`topics-${batchId}`);
  if (!container) return;
  const res = await fetch(`${API_BASE_URL}/api/trainer/batches/${batchId}/topics`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) {
    container.innerHTML = "Unable to load topics.";
    return;
  }
  const topics = await res.json();
  if (!topics.length) {
    container.innerHTML = "No topics yet. Add one to start progress.";
    return;
  }
  container.innerHTML = topics.map(topic => `
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" ${topic.completed ? "checked" : ""} onchange="toggleTopic(${topic.id}, this.checked)">
      <span class="${topic.completed ? "line-through text-outline" : ""}">${topic.title}</span>
    </label>
  `).join("");
}

async function addTopic(batchId) {
  const input = document.getElementById(`topic-input-${batchId}`);
  const title = input.value.trim();
  if (!title) return;
  const res = await fetch(`${API_BASE_URL}/api/trainer/batches/${batchId}/topics`, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ title })
  });
  if (!res.ok) {
    const text = await res.text();
    alert("Unable to add topic: " + text);
    return;
  }
  input.value = "";
  await loadTrainerDashboard();
}

async function toggleTopic(topicId, completed) {
  const res = await fetch(`${API_BASE_URL}/api/trainer/topics/${topicId}`, {
    method: "PUT",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ completed })
  });
  if (!res.ok) {
    const text = await res.text();
    alert("Unable to update topic: " + text);
    return;
  }
  await loadTrainerDashboard();
}

async function loadTrainerDashboard() {
  try {
    const res = await fetch(`${API_BASE_URL}/api/trainer/batches`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error("Failed to load trainer batches");
    const batches = await res.json();
    const total = batches.length;
    const completed = batches.filter(b => String(b.status).toUpperCase() === "COMPLETED").length;
    const avg = total ? Math.round(batches.reduce((a, b) => a + (b.progress ?? 0), 0) / total) : 0;
    document.getElementById("kpiTotal").innerText = total;
    document.getElementById("kpiCompleted").innerText = completed;
    document.getElementById("kpiProgress").innerText = `${avg}%`;
    document.getElementById("trainerBatchCards").innerHTML = batches.map(createCard).join("");
    await Promise.all(batches.map(batch => loadTopics(batch.id)));
  } catch (e) { console.error(e); }
}

document.getElementById("createBatchForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const domainName = document.getElementById("batchDomainName").value.trim();
  const startDate = document.getElementById("batchStartDate").value;
  const endDate = document.getElementById("batchEndDate").value;
  if (!domainName || !startDate || !endDate) return;
  const payload = { domainName, startDate, endDate, time: "09:00 AM - 11:00 AM", labNo: "Lab-1", noOfStudents: 25, progress: 0 };
  try {
    const res = await fetch(`${API_BASE_URL}/api/trainer/batches`, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const errorText = await res.text();
      throw new Error(errorText || "Failed to create batch");
    }
    event.target.reset();
    await loadTrainerDashboard();
  } catch (e) { console.error(e); alert("Unable to create batch: " + e.message); }
});

setLoggedInName();
loadTrainerDashboard();
</script>
