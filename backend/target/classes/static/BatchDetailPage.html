	<style>
		.material-symbols-outlined {
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
		}

		body {
			min-height: max(884px, 100dvh);
		}

		.glow-border {
			position: relative;
			border-radius: 12px;
		}

		.glow-border::before {
			content: "";
			position: absolute;
			inset: 0;
			padding: 2px;
			border-radius: 12px;
			background: linear-gradient(120deg, #00f0ff, #0d7377, #81d4d8, #00f0ff);
			background-size: 300%;
			animation: glowMove 5s linear infinite;
			-webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
			-webkit-mask-composite: xor;
			mask-composite: exclude;
			pointer-events: none;
		}

		@keyframes glowMove {
			0% {
				background-position: 0%
			}

			100% {
				background-position: 300%
			}
		}

		button {
			transition: all 0.3s ease;
		}

		button:hover {
			transform: scale(1.03);
			box-shadow: 0 5px 15px rgba(13, 115, 119, 0.4);
		}

		aside a {
			transition: all 0.3s ease;
		}

		aside a:hover {
			transform: translateX(6px);
		}

		.batch-card {
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.batch-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 24px rgba(0, 89, 92, 0.12);
		}

		@keyframes fadeInUp {
			from {
				opacity: 0;
				transform: translateY(16px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.card-animate {
			animation: fadeInUp 0.4s ease both;
		}
	</style>
</head>

	<script>
		const API_BASE_URL = "http://localhost:8080";

		function authHeaders() {
			return {
				Authorization: `Bearer ${localStorage.getItem("token")}`,
				"Content-Type": "application/json"
			};
		}

		const token = localStorage.getItem("token");
		const role = localStorage.getItem("role");
		if (!token) window.location.href = "index.html";
		if (!role || role !== "ADMIN") {
			window.location.href = role === "TRAINER" ? "Trainerdashboard.html" : "index.html";
		}

		function logout() {localStorage.clear(); window.location.href = "index.html";}

		function formatDate(v) {
			if (!v) return "N/A";
			const d = new Date(v);
			return isNaN(d.getTime()) ? v : d.toLocaleDateString();
		}

		async function loadAdminBatches() {
			try {
				const res = await fetch(`${API_BASE_URL}/api/admin/batches`, {headers: authHeaders()});
				if (!res.ok) throw new Error("Failed to load batches");

				const allBatches = await res.json();

				const showAll = window.showAllBatches || false;
				const filtered = allBatches.filter(b => (b.progress ?? 0) < 100 && String(b.status).toUpperCase() !== "COMPLETED");
				const batches = showAll ? filtered : filtered.slice(0, 4);
				const total = filtered.length;
				const completed = allBatches.filter(b => String(b.status).toUpperCase() === "COMPLETED").length;
				const avg = total ? Math.round(filtered.reduce((a, b) => a + (b.progress ?? 0), 0) / total) : 0;

				document.getElementById("kpiTotal").innerText = total;
				document.getElementById("kpiCompleted").innerText = completed;
				document.getElementById("kpiProgress").innerText = `${avg}%`;
				document.getElementById("kpiTotalBar").style.width = `${Math.min(total * 10, 100)}%`;
				document.getElementById("kpiProgressBar").style.width = `${avg}%`;

				document.getElementById("adminBatchCards").innerHTML = batches.length
					? batches.map(batch => `
            <div class="batch-card bg-surface-container-lowest p-6 rounded-xl glow-border">
              <div class="flex justify-between items-start mb-6">
                <div>
                  <h3 class="text-xl font-headline font-bold text-on-surface">${batch.domainName || "Untitled Batch"}</h3>
                  <p class="text-sm text-on-surface-variant mt-1">Trainer: ${batch.trainerName || "Unassigned"}</p>
                  <p class="text-sm text-on-surface-variant mt-1">Lab No: ${batch.labNo || "N/A"}</p>
                  <p class="text-sm text-on-surface-variant mt-1">Students: ${batch.noOfStudents ?? 0}</p>
                  <p class="text-sm text-on-surface-variant mt-1">Timing: ${batch.time || "Not set"}</p>
                </div>
                <div class="text-right">
                  <span class="block text-xs font-label text-outline uppercase tracking-wider">Timeline</span>
                  <span class="text-sm font-medium text-on-surface">${formatDate(batch.startDate)} – ${formatDate(batch.endDate)}</span>
                </div>
              </div>
			  <div class="flex items-center gap-4">
			    <div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
			      <div class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full transition-all duration-700"
			           style="width:${batch.progress ?? 0}%"></div>
			    </div>
			    <span class="font-headline font-bold text-lg text-primary">${batch.progress ?? 0}%</span>
			  </div>

			  <!-- ✅ NEW BUTTONS -->
			  <div class="flex justify-end gap-3 mt-4">

				<button 
				  onclick="openEditForm(${batch.id}, '${batch.domainName}', '${batch.startDate}', '${batch.endDate}', '${batch.time}', '${batch.labNo}', ${batch.noOfStudents})"
				  class="px-4 py-1.5 border border-gray-400 rounded-full text-sm font-medium">
				  Edit
				</button>

				<button 
				onclick="deleteBatch(${batch.id})"
				  class="px-4 py-1.5 bg-error text-white rounded-full text-sm font-medium 
				         hover:opacity-90 transition-all">
				  Delete
				</button>

			  </div>
			  
			  
            </div>
          `).join("")
					: `<div class="col-span-2 text-center py-16 text-on-surface-variant">
               <span class="material-symbols-outlined text-5xl">layers_clear</span>
               <p class="mt-2 font-headline font-bold">No active batches found</p>
               <button onclick="window.location.href='/CreateBatch.html'"
                 class="mt-4 bg-primary text-white px-6 py-2 rounded-lg font-bold text-sm">Create First Batch</button>
             </div>`;
			} catch (e) {
				console.error("Load batches error:", e);
				document.getElementById("adminBatchCards").innerHTML =
					`<div class="col-span-2 text-center py-16 text-error">
             <span class="material-symbols-outlined text-5xl">error</span>
             <p class="mt-2 font-headline font-bold">Failed to load batches</p>
           </div>`;
			}
		}

		/* ===== LOAD ALL BATCHES (ADMIN + TRAINER CREATED) ===== */
		async function fetchAllBatches() {
			try {
				/* 
				   Admin batches endpoint 
				   Trainer-created batches endpoint
				   Make sure backend provides both APIs
				*/
				const [adminRes, trainerRes] = await Promise.all([
					fetch(`${API_BASE_URL}/api/admin/batches`, {
						headers: authHeaders()
					}),
					fetch(`${API_BASE_URL}/api/trainer/batches`, {
						headers: authHeaders()
					})
				]);

				if (!adminRes.ok) throw new Error("Failed to load admin batches");
				if (!trainerRes.ok) throw new Error("Failed to load trainer batches");

				const adminBatches = await adminRes.json();
				const trainerBatches = await trainerRes.json();

				/* ===== MERGE BOTH ===== */
				const allBatches = [
					...adminBatches.map(batch => ({
						...batch,
						createdSource: "ADMIN"
					})),
					...trainerBatches.map(batch => ({
						...batch,
						createdSource: "TRAINER"
					}))
				];

				/* ===== REMOVE DUPLICATES IF SAME ID ===== */
				const uniqueBatches = Array.from(
					new Map(allBatches.map(batch => [batch.id, batch])).values()
				);

				/* ===== SORT NEWEST FIRST ===== */
				uniqueBatches.sort((a, b) => {
					const dateA = new Date(a.createdAt || a.startDate || 0);
					const dateB = new Date(b.createdAt || b.startDate || 0);
					return dateB - dateA;
				});

				return uniqueBatches;

			} catch (error) {
				console.error("Error fetching all batches:", error);
				return [];
			}
		}

		const toggleBtn = document.getElementById("toggleViewBtn");
		toggleBtn.addEventListener("click", () => {
			window.showAllBatches = !window.showAllBatches;
			toggleBtn.innerHTML = window.showAllBatches
				? `<span class="material-symbols-outlined text-lg">expand_less</span>View Less`
				: `<span class="material-symbols-outlined text-lg">expand_more</span>View All`;
			loadAdminBatches();
		});

		loadAdminBatches();

		async function deleteBatch(batchId) {
			try {
				const confirmDelete = confirm("Are you sure you want to delete this batch?");
				if (!confirmDelete) return;

				const res = await fetch(`${API_BASE_URL}/api/admin/batches/${batchId}`, {
					method: "DELETE",
					headers: authHeaders()
				});

				if (!res.ok) {
					throw new Error("Failed to delete batch");
				}

				// ✅ Reload UI after delete
				loadAdminBatches();

				alert("Batch deleted successfully");

			} catch (err) {
				console.error("Delete Error:", err);
				alert("Error deleting batch");
			}
		}

		let editingBatchId = null;

		/* OPEN MODAL */
		function openEditForm(id, name, start, end, time, lab, students) {
			editingBatchId = id;

			document.getElementById("editDomainName").value = name || "";
			document.getElementById("editStartDate").value = start || "";
			document.getElementById("editEndDate").value = end || "";
			document.getElementById("editStudents").value = students || "";

			// ✅ FIX LAB (IMPORTANT)
			if (lab) {
				const formattedLab = lab.trim().toUpperCase();
				document.getElementById("editLabNo").value = formattedLab;
			}

			// ✅ FIX TIME (IMPORTANT)
			if (time) {
				const cleaned = time.replace(/\s+/g, ""); // remove spaces
				const parts = cleaned.split("-");

				document.getElementById("editStartTime").value = parts[0] || "";
				document.getElementById("editEndTime").value = parts[1] || "";
			}

			document.getElementById("editModal").classList.remove("hidden");
			document.getElementById("editModal").classList.add("flex");
		}

		/* CLOSE MODAL */
		function closeEditModal() {
			editingBatchId = null;
			document.getElementById("editModal").classList.add("hidden");
			document.getElementById("editModal").classList.remove("flex");
		}

		/* SUBMIT EDIT */
		document.getElementById("editBatchForm").addEventListener("submit", async (e) => {
			e.preventDefault();

			const payload = {
				domainName: document.getElementById("editDomainName").value,
				startDate: document.getElementById("editStartDate").value,
				endDate: document.getElementById("editEndDate").value,
				noOfStudents: document.getElementById("editStudents").value,
				labNo: document.getElementById("editLabNo").value,
				time: `${document.getElementById("editStartTime").value} - ${document.getElementById("editEndTime").value}`
			};

			try {
				const res = await fetch(`${API_BASE_URL}/api/admin/batches/${editingBatchId}`, {
					method: "PUT",
					headers: authHeaders(),
					body: JSON.stringify(payload)
				});

				if (!res.ok) throw new Error();

				alert("Batch updated successfully");

				closeEditModal();
				loadAdminBatches(); // refresh UI

			} catch (err) {
				console.error(err);
				alert("Update failed");
			}
		});
	</script>
