	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

						"on-secondary-fixed-variant": "#2f4c4d",

						"surface-container-high": "#e6e8ea",
						"outline-variant": "#bec9c9",
						"on-error": "#ffffff",
						"inverse-on-surface": "#eff1f3",

	<style>
		.material-symbols-outlined {
			font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
		}

		body {
			min-height: max(884px, 100dvh);
		}

		.glow-border {
			position: relative;
			border-radius: 12px;
		}

		.glow-border::before {
			content: "";
			position: absolute;
			inset: 0;
			padding: 2px;
			border-radius: 12px;
			background: linear-gradient(120deg, #00f0ff, #0d7377, #81d4d8, #00f0ff);
			background-size: 300%;
			animation: glowMove 5s linear infinite;
			-webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
			-webkit-mask-composite: xor;
			mask-composite: exclude;
			pointer-events: none;
		}

		@keyframes glowMove {
			0% {
				background-position: 0%
			}

			100% {
				background-position: 300%
			}
		}

		button {
			transition: all 0.3s ease;
		}

		button:hover {
			transform: scale(1.03);
			box-shadow: 0 5px 15px rgba(13, 115, 119, 0.4);
		}

		aside a {
			transition: all 0.3s ease;
		}

		aside a:hover {
			transform: translateX(6px);
		}

		.batch-card {
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.batch-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 8px 24px rgba(0, 89, 92, 0.12);
		}

		@keyframes fadeInUp {
			from {
				opacity: 0;
				transform: translateY(16px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.card-animate {
			animation: fadeInUp 0.4s ease both;
		}
	</style>
</head>

	<script>
		const API_BASE_URL = "http://localhost:8080";

		function authHeaders() {
		    return {
		        Authorization: `Bearer ${localStorage.getItem("token")}`,
		        "Content-Type": "application/json"
		    };
		}

		const token = localStorage.getItem("token");
		const role  = localStorage.getItem("role");

		if (!token) window.location.href = "index.html";
		if (!role || role !== "ADMIN") {
		    window.location.href = role === "TRAINER" ? "Trainerdashboard.html" : "index.html";
		}

		function logout() {
		    localStorage.clear();
		    window.location.href = "index.html";
		}

		function formatDate(v) {
		    if (!v) return "N/A";
		    const d = new Date(v);
		    return isNaN(d.getTime()) ? v : d.toLocaleDateString();
		}

		// ----------------------------
		// TIME UTILITIES
		// ----------------------------

		// "09:00 AM - 11:00 AM" → ["09:00 AM", "11:00 AM"]
		// FIX: split on " - " with spaces to avoid breaking "AM"/"PM" tokens
		function splitBatchTime(timeStr) {
		    if (!timeStr) return ["", ""];
		    const idx = timeStr.indexOf(" - ");
		    if (idx === -1) return [timeStr, ""];
		    return [timeStr.substring(0, idx).trim(), timeStr.substring(idx + 3).trim()];
		}

		// "09:00 AM" → "09:00" (for <input type="time">)
		function convertTo24(t) {
		    if (!t) return "";
		    t = t.trim();
		    if (!t.includes("AM") && !t.includes("PM")) return t; // already 24hr

		    const parts    = t.split(" ");
		    const modifier = parts[parts.length - 1];
		    const timePart = parts[0];
		    let [hours, minutes] = timePart.split(":");

		    if (modifier === "PM" && hours !== "12") hours = String(parseInt(hours) + 12);
		    if (modifier === "AM" && hours === "12")  hours = "00";

		    return `${hours.padStart(2, "0")}:${minutes}`;
		}

		// "09:00" (24hr) → "09:00 AM" (12hr with AM/PM)
		function formatTime(t) {
		    if (!t) return "";
		    const [h, m] = t.split(":").map(Number);
		    const period = h >= 12 ? "PM" : "AM";
		    const hour   = ((h + 11) % 12 + 1).toString().padStart(2, "0");
		    return `${hour}:${m.toString().padStart(2, "0")} ${period}`;
		}

		function isWithinAllowedHours(startTime, endTime) {
			    const [startH] = startTime.split(":").map(Number);
			    const [endH, endM] = endTime.split(":").map(Number);

			    const startMinutes = startH * 60;
			    const endMinutes   = endH * 60 + endM;

			    const allowedStart = 7 * 60;  // 7:00 AM = 420 mins
			    const allowedEnd   = 19 * 60; // 7:00 PM = 1140 mins

			    return startMinutes >= allowedStart && endMinutes <= allowedEnd;
			}
		// ----------------------------
		// STORE ALL BATCHES (used by openEditForm)
		// ----------------------------
		let allBatchesCache = [];

		// ----------------------------
		// LOAD ADMIN BATCHES
		// ----------------------------
		async function loadAdminBatches() {
		    try {
		        const res = await fetch(`${API_BASE_URL}/api/admin/batches`, { headers: authHeaders() });
		        if (!res.ok) throw new Error("Failed to load batches");

		        const allBatches = await res.json();
		        allBatchesCache  = allBatches; // cache for edit

		        const showAll  = window.showAllBatches || false;
		        const filtered = allBatches.filter(
		            b => (b.progress ?? 0) < 100 && String(b.status).toUpperCase() !== "COMPLETED"
		        );
		        const batches   = showAll ? filtered : filtered.slice(0, 4);
		        const total     = filtered.length;
		        const completed = allBatches.filter(b => String(b.status).toUpperCase() === "COMPLETED").length;
		        const avg       = total
		            ? Math.round(filtered.reduce((a, b) => a + (b.progress ?? 0), 0) / total)
		            : 0;

		        document.getElementById("kpiTotal").innerText         = total;
		        document.getElementById("kpiCompleted").innerText     = completed;
		        document.getElementById("kpiProgress").innerText      = `${avg}%`;
		        document.getElementById("kpiTotalBar").style.width    = `${Math.min(total * 10, 100)}%`;
		        document.getElementById("kpiProgressBar").style.width = `${avg}%`;

		        document.getElementById("adminBatchCards").innerHTML = batches.length
		            ? batches.map(batch => {
		                const meetLinkHtml = batch.meetLink && batch.meetLink.trim() !== ""
		                    ? `<a href="${batch.meetLink}" target="_blank" class="underline">${batch.meetLink}</a>`
		                    : "Not available";

		                return `
		                <div class="batch-card bg-surface-container-lowest p-6 rounded-xl glow-border">
		                  <div class="flex justify-between items-start mb-6">
		                    <div>
		                      <h3 class="text-xl font-headline font-bold text-on-surface">
		                        ${batch.domainName || "Untitled Batch"}
		                      </h3>
		                      <p class="text-sm text-on-surface-variant mt-1">Trainer: ${batch.trainerName || "Unassigned"}</p>
		                      <p class="text-sm text-on-surface-variant mt-1">Lab No: ${batch.labNo || "N/A"}</p>
		                      <p class="text-sm text-on-surface-variant mt-1">Students: ${batch.noOfStudents ?? 0}</p>
		                      <p class="text-sm text-on-surface-variant mt-1">Timing: ${batch.time || "Not set"}</p>
		                      <p class="text-sm text-blue-600 mt-1">Meeting Link: ${meetLinkHtml}</p>
		                    </div>
		                    <div class="text-right">
		                      <span class="block text-xs font-label text-outline uppercase tracking-wider">Timeline</span>
		                      <span class="text-sm font-medium text-on-surface">
		                        ${formatDate(batch.startDate)} – ${formatDate(batch.endDate)}
		                      </span>
		                    </div>
		                  </div>

		                  <div class="flex items-center gap-4">
		                    <div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
		                      <div class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full transition-all duration-700"
		                           style="width:${batch.progress ?? 0}%"></div>
		                    </div>
		                    <span class="font-headline font-bold text-lg text-primary">${batch.progress ?? 0}%</span>
		                  </div>

		                  <div class="flex justify-end gap-3 mt-4">
		                    <!-- FIX: Pass only batch.id — read full data from cache in openEditForm -->
		                    <button
		                      onclick="openEditForm(${batch.id})"
		                      class="px-4 py-1.5 border border-gray-400 rounded-full text-sm font-medium">
		                      Edit
		                    </button>
		                    <button
		                      onclick="deleteBatch(${batch.id})"
		                      class="px-4 py-1.5 bg-error text-white rounded-full text-sm font-medium hover:opacity-90 transition-all">
		                      Delete
		                    </button>
		                  </div>
		                </div>`;
		            }).join("")
		            : `<div class="col-span-2 text-center py-16 text-on-surface-variant">
		                 <span class="material-symbols-outlined text-5xl">layers_clear</span>
		                 <p class="mt-2 font-headline font-bold">No active batches found</p>
		                 <button onclick="window.location.href='/CreateBatch.html'"
		                   class="mt-4 bg-primary text-white px-6 py-2 rounded-lg font-bold text-sm">
		                   Create First Batch
		                 </button>
		               </div>`;

		    } catch (e) {
		        console.error("Load batches error:", e);
		        document.getElementById("adminBatchCards").innerHTML =
		            `<div class="col-span-2 text-center py-16 text-error">
		               <span class="material-symbols-outlined text-5xl">error</span>
		               <p class="mt-2 font-headline font-bold">Failed to load batches</p>
		             </div>`;
		    }
		}

		// ----------------------------
		// TOGGLE VIEW
		// ----------------------------
		const toggleBtn = document.getElementById("toggleViewBtn");
		toggleBtn.addEventListener("click", () => {
		    window.showAllBatches = !window.showAllBatches;
		    toggleBtn.innerHTML = window.showAllBatches
		        ? `<span class="material-symbols-outlined text-lg">expand_less</span>View Less`
		        : `<span class="material-symbols-outlined text-lg">expand_more</span>View All`;
		    loadAdminBatches();
		});

		// ----------------------------
		// DELETE BATCH
		// ----------------------------
		async function deleteBatch(batchId) {
		    if (!confirm("Are you sure you want to delete this batch?")) return;

		    try {
		        const res = await fetch(`${API_BASE_URL}/api/admin/batches/${batchId}`, {
		            method: "DELETE",
		            headers: authHeaders()
		        });

		        if (!res.ok) throw new Error("Failed to delete batch");

		        alert("Batch deleted successfully");
		        loadAdminBatches();

		    } catch (err) {
		        console.error("Delete Error:", err);
		        alert("Error deleting batch");
		    }
		}

		// ----------------------------
		// EDIT MODAL
		// ----------------------------
		let editingBatchId = null;

		// FIX: Only takes id — reads full batch from cache
		// This avoids ALL quote-breaking issues with meetLink / time strings in onclick
		function openEditForm(id) {
		    const batch = allBatchesCache.find(b => String(b.id) === String(id));
		    if (!batch) {
		        alert("Batch data not found. Please refresh.");
		        return;
		    }

		    editingBatchId = id;

		    document.getElementById("editDomainName").value = batch.domainName || "";
		    document.getElementById("editStartDate").value  = batch.startDate  || "";
		    document.getElementById("editEndDate").value    = batch.endDate    || "";
		    document.getElementById("editStudents").value   = batch.noOfStudents || "";
		    document.getElementById("editLabNo").value      = batch.labNo      || "";
		    document.getElementById("editMeetLink").value   = batch.meetLink   || "";

		    // FIX: Split time correctly using " - " separator
		    const [startRaw, endRaw] = splitBatchTime(batch.time);
		    document.getElementById("editStartTime").value = convertTo24(startRaw); // → "09:00"
		    document.getElementById("editEndTime").value   = convertTo24(endRaw);   // → "11:00"

		    document.getElementById("editModal").classList.remove("hidden");
		    document.getElementById("editModal").classList.add("flex");
		}

		function closeEditModal() {
		    editingBatchId = null;
		    document.getElementById("editModal").classList.add("hidden");
		    document.getElementById("editModal").classList.remove("flex");
		}

		// ----------------------------
		// SUBMIT EDIT
		// ----------------------------
		document.getElementById("editBatchForm").addEventListener("submit", async (e) => {
		    e.preventDefault();

		    const startTime = document.getElementById("editStartTime").value; // "09:00"
		    const endTime   = document.getElementById("editEndTime").value;   // "11:00"

		    if (!startTime || !endTime) {
		        alert("Please set both start and end time.");
		        return;
		    }
			
			if (startDate > endDate) {
				    showToast("End date must be after start date.", "error");
				    return;
				  }

				  if (startTime >= endTime) {
				    showToast("End time must be later than start time.", "error");
				    return;
				  }
				  if (!isWithinAllowedHours(startTime, endTime)) {
				      showToast("Batches can only be scheduled between 7:00 AM and 7:00 PM.", "error");
				      return;
				  }

		    const payload = {
		        domainName:   document.getElementById("editDomainName").value.trim(),
		        startDate:    document.getElementById("editStartDate").value,
		        endDate:      document.getElementById("editEndDate").value,
		        noOfStudents: parseInt(document.getElementById("editStudents").value),
		        labNo:        document.getElementById("editLabNo").value,
		        // FIX: Convert 24hr back to AM/PM format before sending to backend
		        time:         `${formatTime(startTime)} - ${formatTime(endTime)}`,
		        meetLink:     document.getElementById("editMeetLink").value.trim()
		    };

		    console.log("Edit payload:", payload);

		    try {
		        const res = await fetch(`${API_BASE_URL}/api/admin/batches/${editingBatchId}`, {
		            method: "PUT",
		            headers: authHeaders(),
		            body: JSON.stringify(payload)
		        });

		        if (!res.ok) {
		            const errText = await res.text();
		            console.error("Backend error:", errText);
		            throw new Error(errText || "Update failed");
		        }

		        alert("Batch updated successfully");
		        closeEditModal();
		        loadAdminBatches();

		    } catch (err) {
		        console.error(err);
		        alert("Update failed: " + err.message);
		    }
		});

		// ----------------------------
		// INITIAL LOAD
		// ----------------------------
		loadAdminBatches();
	</script>


</body>
